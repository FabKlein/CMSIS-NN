name: CMSIS NN Integer CM55 FVP Regression

on:
  workflow_dispatch:
    inputs:
      tests:
        description: Comma-separated integer test targets to run
        required: false
        default: all
      toolchains:
        description: Comma-separated toolchains to run
        required: false
        default: GCC@14.3.1,AC6@6.24.0,IAR@9.70.4
  pull_request:
    branches: [main]
  push:
    branches: [main, iar_support_branch]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fvp:
    name: FVP ${{ matrix.toolchain_label }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: gcc
            toolchain: GCC
            toolchain_label: GCC@14.3.1
          - key: ac6
            toolchain: AC6
            toolchain_label: AC6@6.24.0
          - key: iar
            toolchain: IAR
            toolchain_label: IAR@9.70.4

    env:
      INTEGER_TESTS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tests || 'all' }}
      SELECTED_TOOLCHAINS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.toolchains || 'GCC@14.3.1,AC6@6.24.0,IAR@9.70.4' }}
      CMSIS_PACK_ROOT: /home/runner/.cache/arm/packs
      INTEGER_BUILD_ROOT: ${{ github.workspace }}/.ci-tmp/cmsis-nn-integer-fvp
      IAR_LMS_BEARER_TOKEN: ${{ secrets.IAR_LMS_BEARER_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install termcolor pyserial

      - name: Check toolchain selection
        id: select
        run: |
          if [[ ",${SELECTED_TOOLCHAINS}," == *",${{ matrix.toolchain_label }},"* ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Skip unselected toolchain
        if: steps.select.outputs.enabled != 'true'
        run: |
          {
            echo "## ${{ matrix.toolchain_label }}"
            echo ""
            echo "Skipped by workflow_dispatch filter."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Check IAR license secret
        if: steps.select.outputs.enabled == 'true' && matrix.toolchain == 'IAR' && env.IAR_LMS_BEARER_TOKEN == ''
        run: |
          {
            echo "## ${{ matrix.toolchain_label }}"
            echo ""
            echo "IAR was selected, but the IAR_LMS_BEARER_TOKEN secret is not configured."
          } >> "${GITHUB_STEP_SUMMARY}"
          exit 1

      - name: Install Arm tools
        if: steps.select.outputs.enabled == 'true'
        uses: ARM-software/cmsis-actions/vcpkg@v1
        with:
          config: vcpkg-configuration.json

      - name: Activate Arm tool license
        if: steps.select.outputs.enabled == 'true' && matrix.toolchain == 'AC6'
        uses: ARM-software/cmsis-actions/armlm@v1

      - name: Cache CMSIS packs
        if: steps.select.outputs.enabled == 'true'
        uses: actions/cache@v5
        with:
          key: cmsis-packs
          path: /home/runner/.cache/arm/packs

      - name: Install required CMSIS packs
        if: steps.select.outputs.enabled == 'true'
        run: |
          cpackget add "ARM::CMSIS@6.3.0" -R "${CMSIS_PACK_ROOT}" --agree-embedded-license
          cpackget add "ARM::Cortex_DFP@1.1.0" -R "${CMSIS_PACK_ROOT}" --agree-embedded-license

      - name: Export generic toolchain aliases
        if: steps.select.outputs.enabled == 'true'
        run: |
          if [[ -n "${GCC_TOOLCHAIN_14_3_1:-}" ]]; then
            echo "GCC_TOOLCHAIN=${GCC_TOOLCHAIN_14_3_1}" >> "${GITHUB_ENV}"
          fi
          if [[ -n "${AC6_TOOLCHAIN_6_24_0:-}" ]]; then
            echo "AC6_TOOLCHAIN=${AC6_TOOLCHAIN_6_24_0}" >> "${GITHUB_ENV}"
          fi
          if [[ -z "${IAR_TOOLCHAIN_9_70_4:-}" ]]; then
            iar_cc="$(command -v iccarm || true)"
            if [[ -z "${iar_cc}" ]]; then
              iar_cc="$(find "${GITHUB_WORKSPACE}/.vcpkg/downloads/artifacts" -path '*/compilers.iar.cxarm/*/arm/bin/iccarm' -print -quit 2>/dev/null || true)"
            fi
            if [[ -n "${iar_cc}" ]]; then
              echo "IAR_TOOLCHAIN_9_70_4=$(dirname "${iar_cc}")" >> "${GITHUB_ENV}"
              echo "IAR_TOOLCHAIN=$(dirname "${iar_cc}")" >> "${GITHUB_ENV}"
            fi
          fi
          if [[ -n "${IAR_TOOLCHAIN_9_70_4:-}" ]]; then
            echo "IAR_TOOLCHAIN=${IAR_TOOLCHAIN_9_70_4}" >> "${GITHUB_ENV}"
          fi

      - name: Run integer CMSIS/FVP regression
        if: steps.select.outputs.enabled == 'true'
        working-directory: Tests/UnitTest
        run: |
          set +e
          set -o pipefail

          python3 run_integer_unit_tests.py \
            --tests "${INTEGER_TESTS}" \
            --build-fvp \
            --run-fvp \
            --toolchains "${{ matrix.toolchain }}" \
            --jobs 4 \
            --fvp-timeout 120 \
            --cmsis-pack-root "${CMSIS_PACK_ROOT}" \
            --build-root "${INTEGER_BUILD_ROOT}" \
            --fvp-bin FVP_Corstone_SSE-300 \
            --fvp-image-arg=-a | tee integer_fvp.log

          status=${PIPESTATUS[0]}

          {
            echo "## ${{ matrix.toolchain_label }}"
            echo ""
            echo "- Tests: \`${INTEGER_TESTS}\`"
            echo ""
            echo '```text'
            sed -n '/^Integer Unit-Test Summary/,$p' integer_fvp.log
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

          exit "${status}"

      - name: Upload integer FVP logs
        if: always() && steps.select.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: integer-fvp-${{ matrix.key }}
          path: |
            Tests/UnitTest/integer_fvp.log
            ${{ env.INTEGER_BUILD_ROOT }}/**/*.log
